<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore di consigli per genitori di sedicenni</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f0eb;
            color: #2c2416;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            max-width: 700px;
            width: 100%;
            padding: 2rem 1.8rem;
            transition: all 0.2s;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #4a3e35;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: #7b6e60;
            margin-bottom: 1.8rem;
            font-size: 1rem;
            border-left: 4px solid #c9b8a8;
            padding-left: 1rem;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.4rem;
            color: #4a3e35;
        }

        select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d6cec3;
            border-radius: 12px;
            font-size: 1rem;
            background: #fdfaf7;
            color: #2c2416;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%234a3e35" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 1.2rem;
        }

        .btn-generate {
            background: #b5835c;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-generate:hover {
            background: #9c6e48;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .card {
            background: #fdfaf7;
            border-radius: 20px;
            padding: 1.6rem;
            border: 1px solid #e7ddd1;
            margin-top: 0.8rem;
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .card.visible {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card .tema-badge {
            display: inline-block;
            background: #e7ddd1;
            color: #5e4c3a;
            border-radius: 20px;
            padding: 0.25rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.8rem;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.6rem;
            color: #4a3e35;
        }

        .card .consiglio {
            font-size: 1.05rem;
            background: #fffbf7;
            padding: 1rem 1.2rem;
            border-radius: 16px;
            border: 1px solid #e2d6c9;
            margin-bottom: 1.2rem;
            font-style: italic;
            line-height: 1.7;
        }

        .riferimento {
            background: #f7f3ed;
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .riferimento .esperto {
            font-weight: 700;
            color: #3f3326;
        }

        .riferimento .opera {
            font-weight: 500;
            color: #6b5e4f;
        }

        .riferimento .concetto {
            color: #4a3e35;
            margin-top: 0.4rem;
            border-left: 3px solid #c9b8a8;
            padding-left: 0.8rem;
        }

        .confidenza {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.2rem;
        }

        .confidenza.alto {
            color: #2d6a4f;
        }
        .confidenza.medio {
            color: #b68b40;
        }
        .confidenza.basso {
            color: #b34a4a;
        }

        .btn-verify {
            background: transparent;
            border: 1.5px solid #b5835c;
            color: #b5835c;
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-verify:hover {
            background: #b5835c;
            color: white;
        }

        .counter-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.5rem;
            background: #f7f3ed;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            color: #4a3e35;
            font-weight: 500;
        }

        .counter-number {
            background: #b5835c;
            color: white;
            border-radius: 30px;
            padding: 0.25rem 0.9rem;
            font-weight: 700;
            font-size: 1.1rem;
        }

        footer {
            margin-top: 2rem;
            color: #8f8172;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 500px) {
            .container {
                padding: 1.5rem 1.2rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Genitori di sedicenni</h1>
        <div class="subtitle">Consigli pratici basati sulla psicologia dello sviluppo, calibrati sui 16 anni</div>

        <label for="temaSelect">Scegli un tema:</label>
        <select id="temaSelect">
            <option value="">-- Seleziona --</option>
            <option value="Autonomia e regole">Autonomia e regole</option>
            <option value="Comunicazione">Comunicazione</option>
            <option value="Conflitti su orari/uscite">Conflitti su orari/uscite</option>
            <option value="Uso di smartphone e social">Uso di smartphone e social</option>
            <option value="Relazioni sentimentali">Relazioni sentimentali</option>
            <option value="Motivazione scolastica">Motivazione scolastica</option>
            <option value="Gestione delle emozioni">Gestione delle emozioni</option>
            <option value="Gruppo dei pari">Gruppo dei pari</option>
        </select>

        <button class="btn-generate" id="generateBtn">✨ Genera consiglio</button>

        <div id="cardContainer" class="card">
            <span class="tema-badge" id="cardTema"></span>
            <h3 id="cardTitolo"></h3>
            <div class="consiglio" id="cardConsiglio"></div>
            <div class="riferimento">
                <span class="esperto" id="refEsperto"></span>
                <span class="opera" id="refOpera"></span>
                <div class="concetto" id="refConcetto"></div>
                <span class="confidenza" id="refConfidenza"></span>
            </div>
            <button class="btn-verify" id="verifyBtn">🔍 Verifica questo riferimento</button>
        </div>

        <div class="counter-panel">
            📋 Schede generate in questa sessione: <span class="counter-number" id="sessionCounter">0</span>
        </div>
    </div>
    <footer>
        Corso di alfabetizzazione all'IA — Esercizio didattico: verifica sempre le fonti.
    </footer>

    <script>
        (function() {
            // Database delle schede (5 per tema, totale 40)
            const schedeDB = [
                // AUTONOMIA E REGOLE (5)
                {
                    tema: "Autonomia e regole",

                    esperto: "Laurence Steinberg",
                    opera: "Age of Opportunity (2014)",
                    concetto: "Steinberg sottolinea che l'adolescenza è un periodo di straordinaria plasticità cerebrale: i ragazzi hanno bisogno di esplorare i propri limiti in un ambiente sicuro, con adulti che fungono da rete di protezione piuttosto che da controllori rigidi.",
                    confidenza: "Alto"

                    esperto: "Lisa Damour",

                {

                    esperto: "Daniel Siegel",
                    opera: "Brainstorm (2013)",
                    concetto: "Siegel descrive il cervello adolescente come un'opera in costruzione: la tecnica del 'brainstorming' condiviso aiuta a integrare le aree emotive e razionali, favorendo decisioni più consapevoli.",

                // CONFLITTI SU ORARI/USCITE (5)
                {

                    consiglio: "Negoziate un rientro flessibile legato all'attività specifica (cinema, festa, studio con amici) invece di imporre un orario fisso uguale per ogni occasione. A 16 anni il bisogno di socialità è neurologico; mostrare fiducia differenziata aiuta a sviluppare l'autoregolazione.",
                    esperto: "Laurence Steinberg",
                    opera: "Age of Opportunity (2014)",
                    concetto: "Steinberg sottolinea che il sistema dopaminergico dell'adolescente risponde fortemente alla ricompensa sociale: proibire tout court può aumentare la tentazione, mentre accordi ragionati insegnano gradualmente l'autocontrollo.",

                {
                    tema: "Conflitti su orari/uscite",

                    esperto: "Lisa Damour",

            // Riferimenti al DOM
            const temaSelect = document.getElementById('temaSelect');

            const cardContainer = document.getElementById('cardContainer');
            const cardTema = document.getElementById('cardTema');

            const refOpera = document.getElementById('refOpera');

            const refConfidenza = document.getElementById('refConfidenza');

            let sessionCount = 0;
            let schedaCorrente = null; // memorizza i dati della scheda visualizzata

            // Funzione per mescolare array (Fisher-Yates)
            function shuffle(array) {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // Cache delle schede mescolate per tema, per estrarre senza ripetizioni ravvicinate
            const shuffledCache = {};

            function getRandomSchedaByTema(tema) {
                if (!shuffledCache[tema] || shuffledCache[tema].length === 0) {
                    const filtered = schedeDB.filter(s => s.tema === tema);
                    if (filtered.length === 0) return null;
                    shuffledCache[tema] = shuffle(filtered);
                }
                return shuffledCache[tema].pop();
            }

            function aggiornaInterfaccia(scheda) {
                if (!scheda) return;
                schedaCorrente = scheda;
                cardTema.textContent = scheda.tema;
                cardTitolo.textContent = 'Consiglio pratico';
                cardConsiglio.textContent = scheda.consiglio;
                refEsperto.textContent = scheda.esperto;
                refOpera.textContent = scheda.opera;
                refConcetto.textContent = `"${scheda.concetto}"`;
                refConfidenza.textContent = `Livello confidenza: ${scheda.confidenza}`;
                refConfidenza.className = 'confidenza ' + scheda.confidenza.toLowerCase();

                // Mostra la card con animazione
                cardContainer.classList.add('visible');

                // Aggiorna il pulsante verifica
                const query = encodeURIComponent(scheda.esperto + ' ' + scheda.opera.split('(')[0].trim());
                verifyBtn.onclick = function() {
                    window.open('https://www.google.com/search?q=' + query, '_blank', 'noopener');
                };
            }

            function generaScheda() {
                const temaSelezionato = temaSelect.value;
                if (!temaSelezionato) {
                    alert('Seleziona un tema dal menu a tendina prima di generare un consiglio.');
                    return;
                }

                const scheda = getRandomSchedaByTema(temaSelezionato);
                if (!scheda) {
                    alert('Nessuna scheda disponibile per questo tema. Riprova più tardi.');
                    return;
                }

                sessionCount++;
                sessionCounterSpan.textContent = sessionCount;
                aggiornaInterfaccia(scheda);
            }

            // Event listener
            generateBtn.addEventListener('click', generaScheda);

            // Inizializza contatore
            sessionCounterSpan.textContent = '0';

            // Gestione reinizializzazione cache se l'utente cambia tema (non è necessario, ma puliamo)
            temaSelect.addEventListener('change', function() {
                // Non resettiamo la cache, perché vogliamo varietà nel tempo per lo stesso tema
            });

            // Per evitare confusione, all'avvio la card è nascosta
            cardContainer.classList.remove('visible');
